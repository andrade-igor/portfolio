<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #fafaf7;
  }
  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    display: grid;
    grid-template-columns: 1fr 420px;
    background: #fafaf7;
    padding: 72px;
    gap: 48px;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: #1e3a5f;
  }
  .left {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .eyebrow {
    font-family: Inter, sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #1e3a5f;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .eyebrow::before {
    content: "";
    width: 48px;
    height: 2px;
    background: #1e3a5f;
  }
  h1 {
    font-family: Fraunces, Georgia, serif;
    font-size: 80px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #1a1a18;
    font-weight: 400;
    margin-top: 28px;
  }
  h1 strong {
    color: #1e3a5f;
    font-weight: 500;
  }
  .stats {
    display: flex;
    gap: 56px;
    margin-top: 48px;
  }
  .stat {
    border-left: 2px solid #e0dcd2;
    padding-left: 20px;
  }
  .stat-num {
    font-family: Fraunces, serif;
    font-size: 48px;
    color: #1e3a5f;
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-family: Inter, sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: #6b6b68;
    font-weight: 600;
    margin-top: 10px;
  }
  .brand {
    font-family: Fraunces, serif;
    font-size: 22px;
    color: #1a1a18;
    font-weight: 500;
  }
  .brand span { color: #1e3a5f; }
  .right {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    background: #ddd;
    box-shadow: 0 20px 60px rgba(26, 26, 24, 0.2);
    aspect-ratio: 4 / 5;
    align-self: center;
    height: 486px;
  }
  .right img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div>
      <div class="eyebrow">Gestor de Tráfego Sênior</div>
      <h1>Transformo verba<br/>em <strong>receita<br/>mensurável.</strong></h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-num">+R$15M</div>
          <div class="stat-label">Em resultados</div>
        </div>
        <div class="stat">
          <div class="stat-num">+5 anos</div>
          <div class="stat-label">No mercado</div>
        </div>
        <div class="stat">
          <div class="stat-num">30+</div>
          <div class="stat-label">Marcas</div>
        </div>
      </div>
    </div>
    <div class="brand">Igor Andrade<span>.</span></div>
  </div>
  <div class="right">
    <img src="assets/igor.png" alt="Igor Andrade" />
  </div>
</div>
</body>
</html>
